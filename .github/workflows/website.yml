#
# Deploy website to production (push to main) or preview (pull requests).
#
# For PRs: Dynamically injects a PR-specific environment into wrangler.json
# to create unique preview URLs (pr-N.filtron.dev) without committing config changes.
# Creates a temporary GitHub environment that links to the preview URL.
# Removes the environment and preview deployment when the PR is closed.
#
name: website
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/website.yml
      - website/**
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - .github/workflows/website.yml
      - website/**

permissions:
  contents: read

concurrency:
  group: website-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-slim
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json
          no-cache: true
      - run: bun ci
      - run: bun run build
      - uses: chrnorm/deployment-action@500aa6a23c81ffa1acf71072aee3cfa2cc2e556a # v2.0.8
        id: create-deployment
        with:
          token: ${{ github.token }}
          environment: production
          production-environment: true
      - run: bun wrangler deploy --no-bundle
        id: deploy
        working-directory: website
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_SEND_METRICS: false
      - uses: chrnorm/deployment-status@6df8d036fd2fee9eb82936733953da1f8382b41e # v2.0.4
        if: success()
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.create-deployment.outputs.deployment_id }}
          environment-url: https://filtron.dev
          state: success
      - uses: chrnorm/deployment-status@6df8d036fd2fee9eb82936733953da1f8382b41e # v2.0.4
        if: failure()
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.create-deployment.outputs.deployment_id }}
          state: failure

  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-slim
    permissions:
      contents: read
      deployments: write
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json
          no-cache: true
      - run: bun ci
      - run: bun run build
      - run: |
          jq --arg pr "pr-${{ github.event.pull_request.number }}" \
             --arg route "pr-${{ github.event.pull_request.number }}.filtron.dev" \
             '.env[$pr] = { routes: [{ pattern: $route, custom_domain: true }] }' \
             wrangler.json > wrangler.tmp.json && mv wrangler.tmp.json wrangler.json
        working-directory: website
      - uses: chrnorm/deployment-action@500aa6a23c81ffa1acf71072aee3cfa2cc2e556a # v2.0.8
        id: create-deployment
        with:
          token: ${{ github.token }}
          environment: pr-${{ github.event.pull_request.number }}
          initial-status: queued
          transient-environment: true
          production-environment: false
      - run: |
          output=$(bun wrangler deploy --no-bundle --env=pr-${{ github.event.pull_request.number }})
          echo "$output"
          domain=$(echo "$output" | grep -oP '^\s+\K[^\s]+(?=\s+\(custom domain\))')
          echo "deployment-url=https://$domain" >> "$GITHUB_OUTPUT"
        id: deploy
        working-directory: website
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_SEND_METRICS: false
      - uses: chrnorm/deployment-status@6df8d036fd2fee9eb82936733953da1f8382b41e # v2.0.4
        if: success()
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.create-deployment.outputs.deployment_id }}
          environment-url: ${{ steps.deploy.outputs.deployment-url }}
          state: success
      - uses: chrnorm/deployment-status@6df8d036fd2fee9eb82936733953da1f8382b41e # v2.0.4
        if: failure()
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.create-deployment.outputs.deployment_id }}
          state: failure

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-slim
    permissions:
      deployments: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json
          no-cache: true
      - run: bun ci
      - run: |
          jq --arg pr "pr-${{ github.event.pull_request.number }}" \
             --arg route "pr-${{ github.event.pull_request.number }}.filtron.dev" \
             '.env[$pr] = { routes: [{ pattern: $route, custom_domain: true }] }' \
             wrangler.json > wrangler.tmp.json && mv wrangler.tmp.json wrangler.json
        working-directory: website
      - run: bun wrangler delete --env=pr-${{ github.event.pull_request.number }} --force
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_SEND_METRICS: false
        working-directory: website
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
        id: get-token
      - uses: strumwolf/delete-deployment-environment@a4825dd9648c57da8437a4885c3fcad58beac69c # v3.0.0
        with:
          token: ${{ steps.get-token.outputs.token }}
          environment: pr-${{ github.event.pull_request.number }}
