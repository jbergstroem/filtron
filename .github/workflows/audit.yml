name: audit
on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-slim
    permissions:
      contents: read
    outputs:
      workflows: ${{ steps.filter.outputs.workflows_any_changed }}
      code: ${{ steps.filter.outputs.code_any_changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        id: filter
        with:
          files_yaml: |
            workflows:
              - .github/workflows/**
              - .github/matchers/**
            code:
              - packages/**/*.ts
              - package.json
              - pnpm-lock.yaml
              - knip.json

  zizmor:
    needs: [changes]
    if: always() && (github.event_name == 'schedule' || needs.changes.result != 'skipped' && needs.changes.outputs.workflows == 'true')
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2

  actionlint:
    needs: [changes]
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-slim
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: curl -Ls "https://github.com/rhysd/actionlint/releases/download/v${{ env.version }}/actionlint_${{ env.version }}_linux_amd64.tar.gz" | sudo tar -x -z -C /usr/local/bin actionlint
        env:
          version: "1.7.11"
      - run: |
          echo "::add-matcher::.github/matchers/actionlint.json"
          actionlint -color

  knip:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: corepack enable && corepack install
      - run: pnpm install --frozen-lockfile
      - run: pnpm run knip
