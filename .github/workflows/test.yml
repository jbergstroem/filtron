name: test
on:
  pull_request:
    paths:
      - .github/workflows/test.yml
      - packages/**
      - examples/**
      - package.json
      - bun.lock
      - tsconfig.json
  push:
    branches:
      - main
    paths:
      - .github/workflows/test.yml
      - packages/**
      - examples/**
      - package.json
      - bun.lock
      - tsconfig.json

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-slim
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json
      - run: bun ci
      - run: bun run build
      - run: bunx metafile-codecov-bundle -f packages/core/metafile.json -n @filtron/core --output-dir packages/core/dist --upload
      - run: bunx metafile-codecov-bundle -f packages/js/metafile.json -n @filtron/js --output-dir packages/js/dist --upload
      - run: bunx metafile-codecov-bundle -f packages/sql/metafile.json -n @filtron/sql --output-dir packages/sql/dist --upload
      - run: bun test --reporter=junit --reporter-outfile=junit.xml --coverage --coverage-reporter=lcov --coverage-dir=coverage
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: ${{ !cancelled() }}
        with:
          use_oidc: true
          files: ./coverage/lcov.info
          disable_search: true
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: ${{ !cancelled() }}
        with:
          use_oidc: true
          report_type: test_results
          files: ./junit.xml
          disable_search: true

  e2e:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-slim
    strategy:
      matrix:
        include:
          - setup: node
            version: "22"
            test_cmd: node -e
          - setup: node
            version: "24"
            test_cmd: node -e
          - setup: node
            version: "26"
            test_cmd: node -e
          - setup: bun
            version: "1.1"
            test_cmd: bun -e
          - setup: bun
            version: "1.2"
            test_cmd: bun -e
          - setup: bun
            version: "1.3"
            test_cmd: bun -e
          # deno has no LTS releases; track the latest two minors
          - setup: deno
            version: "2.8.x"
            test_cmd: deno eval
          - setup: deno
            version: "2.9.x"
            test_cmd: deno eval
    name: e2e (${{ matrix.setup }} ${{ matrix.version }})
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json
      - run: bun ci
      - run: bun run build
      - if: matrix.setup == 'node'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.version }}
      - if: matrix.setup == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ matrix.version }}
      - if: matrix.setup == 'deno'
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: ${{ matrix.version }}

      - run: ${{ matrix.test_cmd }} "Promise.all([import('./packages/core/dist/index.js'), import('./packages/sql/dist/index.js')]).then(([core, sql]) => { const ast = core.parseOrThrow('age>18'); console.log(sql.toSQL(ast)); })"
